<!DOCTYPE html>
<html lang="es">
<head>
    <title>Envíame un mensaje</title>
</head>
<body>

    <h1>Contáctame</h1>
    <p>Si quieres hablar sobre programación, fútbol o motos, déjame un mensaje:</p>

    <form action="#">
        <label for="nombre">Tu Nombre:</label><br>
        <input type="text" id="nombre" name="nombre"><br><br>

        <label for="email">Tu Correo Electrónico:</label><br>
        <input type="email" id="email" name="email"><br><br>

        <label for="mensaje">Mensaje:</label><br>
        <textarea id="mensaje" name="mensaje" rows="4" cols="50"></textarea><br><br>

        <input type="submit" value="Enviar Mensaje">
    </form> 

    <br>
    <a href="yo.html">Volver a la página  principal</a> 

</body>
</html>
