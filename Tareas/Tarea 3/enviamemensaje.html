<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Envíame un mensaje</title>
    <link rel="stylesheet" href="estilos.css">
    <link rel="stylesheet" href="maquetacion.css">
</head>
<body>
    <div id="contenedor">
        <header>
            <img src="imagenes/jose_manuel.jpg" alt="Foto de Jose Manuel">
            <div>
                <h1>Mi Sitio Web Personal</h1>
            </div>
        </header>

        <main>
            <h1>Contáctame</h1>
            <p>Si quieres hablar sobre programación, fútbol o motos, déjame un mensaje: </p>

            <form action="#">
                <div>
                    <label for="nombre">Tu Nombre:</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>

                <div>
                    <label for="email">Tu Correo Electrónico:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
                </div>

                <div>
                    <input type="submit" value="Enviar Mensaje">
                </div>
            </form> 

            <nav style="margin-top: 30px;">
                <ul class="menu">
                    <li><a href="menu.html">Volver al menú principal</a></li>
                </ul>
            </nav>
        </main>
    </div>
</body>
</html>
